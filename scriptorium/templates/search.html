<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Search · The Scriptorium</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />
<style>
  .search-hero { padding: 64px 0 32px; text-align: center; }
  .search-hero h1 { font-size: 28px; font-weight: 700; color: var(--text-strong); letter-spacing: -0.02em; margin: 0 0 14px; }
  .search-hero p { color: var(--text-muted); font-size: 14px; margin: 0 auto 24px; max-width: 50ch; }
  .search-bar { width: 560px; max-width: 100%; margin: 0 auto; }
  .search-bar input { height: 48px; font-size: 15px; padding-left: 46px; }
  .search-bar .search-icon { left: 16px; }
  .search-bar .search-kbd { right: 12px; }
  .all-villages-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-top: 40px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-header-inner">
    <a class="brand" href="/index.html">
      <span class="brand-mark" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M11 1 L20 6 L20 16 L11 21 L2 16 L2 6 Z" stroke="#81e6d9" stroke-width="1.4" fill="rgba(129,230,217,0.08)"/>
          <path d="M11 6 L16 8.5 L16 13.5 L11 16 L6 13.5 L6 8.5 Z" stroke="#81e6d9" stroke-width="1" fill="none" opacity="0.6"/>
          <circle cx="11" cy="11" r="1.6" fill="#81e6d9"/>
        </svg>
      </span>
      <span class="brand-name">The <b>Scriptorium</b></span>
    </a>
  </div>
</header>

<main class="container">
  <section class="search-hero">
    <h1>Search</h1>
    <p>Full-text search across every village's wiki and demos is coming. For now, browse the villages directly.</p>
    <div class="search search-bar">
      <span class="search-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M12.5 12.5 L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </span>
      <input placeholder="Search not wired up yet — coming soon" disabled />
      <span class="search-kbd">⌘K</span>
    </div>
  </section>

  <div class="all-villages-grid">
    {% for v in villages %}
    <a class="village-card" href="/villages/{{ v.slug }}.html">
      <div class="village-card-head">
        <div>
          <div class="village-name">{{ v.name }}</div>
          <div class="dim mono" style="font-size:11px;margin-top:2px">/villages/{{ v.slug }}</div>
        </div>
        <span class="chip chip-{{ v.type }}">{{ v.type }}</span>
      </div>
      <p class="village-desc">{{ v.summary }}</p>
    </a>
    {% endfor %}
  </div>

  <footer class="app-foot">
    <span class="mono">scriptorium</span>
  </footer>
</main>

<script src="/scriptorium.js"></script>
</body>
</html>
